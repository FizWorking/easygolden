services:
  - type: web
    name: qbo-transaction-manager
    env: node
    buildCommand: cd client && NODE_ENV=development npm install && npm run build && cd ../server && NODE_ENV=development npm install && npm run build
    startCommand: node server/dist/index.js
    envVars:
      - key: QBO_CLIENT_ID
        sync: false
      - key: QBO_CLIENT_SECRET
        sync: false
      - key: QBO_REDIRECT_URI
        sync: false
      - key: QBO_ENVIRONMENT
        value: sandbox
      - key: SESSION_SECRET
        generateValue: true
